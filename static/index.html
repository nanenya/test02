<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Orchestrator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

/* 탭 헤더 */
.tab-bar { display: flex; background: #16213e; border-bottom: 2px solid #0f3460; }
.tab-btn { padding: 12px 24px; cursor: pointer; border: none; background: none; color: #888; font-size: 14px; font-weight: 500; transition: all 0.2s; }
.tab-btn.active { color: #e94560; border-bottom: 2px solid #e94560; margin-bottom: -2px; }
.tab-btn:hover:not(.active) { color: #ccc; background: rgba(255,255,255,0.05); }

.tab-content { display: none; flex: 1; overflow: hidden; }
.tab-content.active { display: flex; flex: 1; overflow: hidden; }

/* 채팅 탭 */
.chat-sidebar { width: 240px; background: #16213e; border-right: 1px solid #0f3460; display: flex; flex-direction: column; }
.chat-sidebar-header { padding: 12px; border-bottom: 1px solid #0f3460; display: flex; justify-content: space-between; align-items: center; }
.chat-sidebar-header span { font-size: 13px; font-weight: 600; color: #ccc; }
.btn-new { background: #e94560; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
.btn-new:hover { background: #c73652; }
.convo-list { flex: 1; overflow-y: auto; }
.convo-item { padding: 10px 12px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.convo-item:hover { background: rgba(233,69,96,0.1); color: #e0e0e0; }
.convo-item.active { background: rgba(233,69,96,0.2); color: #e94560; }

.chat-main { flex: 1; display: flex; flex-direction: column; }
.chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
.msg { max-width: 80%; padding: 10px 14px; border-radius: 8px; font-size: 14px; line-height: 1.5; word-break: break-word; }
.msg.user { align-self: flex-end; background: #0f3460; color: #e0e0e0; }
.msg.assistant { align-self: flex-start; background: #1a2a4a; color: #e0e0e0; }
.msg.error { background: rgba(233,69,96,0.2); color: #ff6b6b; border: 1px solid #e94560; }
.msg.system { align-self: center; background: rgba(255,255,255,0.05); color: #888; font-size: 12px; font-style: italic; }

.plan-card { align-self: flex-start; background: #0d2137; border: 1px solid #1e4a7a; border-radius: 8px; padding: 12px 16px; max-width: 85%; }
.plan-card h4 { color: #5ba8f5; font-size: 13px; margin-bottom: 8px; }
.plan-card p { font-size: 13px; color: #ccc; margin-bottom: 10px; }
.plan-actions { display: flex; gap: 8px; }
.btn-confirm { background: #28a745; color: white; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; }
.btn-confirm:hover { background: #218838; }
.btn-cancel { background: #6c757d; color: white; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; }
.btn-cancel:hover { background: #5a6268; }

.chat-input-row { padding: 12px 16px; background: #16213e; border-top: 1px solid #0f3460; display: flex; gap: 8px; }
.chat-input { flex: 1; background: #0f1e35; border: 1px solid #0f3460; color: #e0e0e0; padding: 10px 12px; border-radius: 6px; font-size: 14px; resize: none; min-height: 42px; max-height: 120px; }
.chat-input:focus { outline: none; border-color: #e94560; }
.btn-send { background: #e94560; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; }
.btn-send:hover { background: #c73652; }
.btn-send:disabled { background: #555; cursor: not-allowed; }

/* 대화이력 탭 */
.history-panel { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
.filter-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.filter-row input, .filter-row select { background: #16213e; border: 1px solid #0f3460; color: #e0e0e0; padding: 7px 10px; border-radius: 4px; font-size: 13px; }
.filter-row input:focus, .filter-row select:focus { outline: none; border-color: #e94560; }
.btn-search { background: #0f3460; color: #e0e0e0; border: none; padding: 7px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; }
.btn-search:hover { background: #1a4a80; }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #16213e; padding: 10px 12px; text-align: left; color: #888; font-weight: 500; border-bottom: 1px solid #0f3460; }
td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: middle; }
tr:hover td { background: rgba(255,255,255,0.03); }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
.badge.active { background: rgba(40,167,69,0.2); color: #28a745; }
.badge.final { background: rgba(91,168,245,0.2); color: #5ba8f5; }
.kw-tag { display: inline-block; background: rgba(233,69,96,0.15); color: #e94560; padding: 1px 6px; border-radius: 3px; font-size: 11px; margin: 1px; }
.btn-icon { background: none; border: none; cursor: pointer; font-size: 15px; padding: 3px 6px; border-radius: 4px; }
.btn-icon:hover { background: rgba(255,255,255,0.1); }
.btn-danger { color: #e94560; }

/* 함수 탭 */
.functions-panel { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
.stats-bar { display: flex; gap: 16px; flex-wrap: wrap; }
.stat-card { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 12px 16px; min-width: 140px; }
.stat-card .stat-label { font-size: 11px; color: #888; margin-bottom: 4px; }
.stat-card .stat-value { font-size: 22px; font-weight: 600; color: #5ba8f5; }
.func-group-header { background: #16213e; padding: 8px 14px; border-radius: 4px; font-size: 13px; font-weight: 600; color: #aaa; margin-top: 8px; cursor: pointer; display: flex; justify-content: space-between; }
.func-row { background: #0d1b2e; border: 1px solid rgba(255,255,255,0.05); border-radius: 4px; margin: 4px 0; padding: 10px 14px; font-size: 13px; cursor: pointer; }
.func-row:hover { border-color: #1e4a7a; }
.func-name { color: #5ba8f5; font-weight: 500; }
.func-desc { color: #888; font-size: 12px; margin-top: 2px; }
pre.code-view { background: #050d1a; border: 1px solid #0f3460; border-radius: 6px; padding: 14px; font-size: 12px; overflow-x: auto; white-space: pre-wrap; color: #a8c7f0; max-height: 300px; overflow-y: auto; }

/* 설정 탭 */
.settings-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.sub-tab-bar { display: flex; background: #16213e; padding: 0 16px; border-bottom: 1px solid #0f3460; }
.sub-tab-btn { padding: 10px 16px; cursor: pointer; border: none; background: none; color: #888; font-size: 13px; }
.sub-tab-btn.active { color: #5ba8f5; border-bottom: 2px solid #5ba8f5; }
.sub-tab-btn:hover:not(.active) { color: #ccc; }
.sub-tab-content { display: none; flex: 1; overflow-y: auto; padding: 20px; }
.sub-tab-content.active { display: block; }

.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; }
.form-group input, .form-group textarea, .form-group select { width: 100%; background: #0f1e35; border: 1px solid #0f3460; color: #e0e0e0; padding: 8px 10px; border-radius: 4px; font-size: 13px; }
.form-group textarea { min-height: 80px; resize: vertical; }
.form-group input:focus, .form-group textarea:focus { outline: none; border-color: #5ba8f5; }
.btn-primary { background: #0f3460; color: white; border: none; padding: 8px 18px; border-radius: 4px; cursor: pointer; font-size: 13px; }
.btn-primary:hover { background: #1a4a80; }
.btn-sm { padding: 4px 10px; font-size: 12px; border-radius: 3px; border: none; cursor: pointer; }
.btn-edit { background: #1a4a80; color: #e0e0e0; }
.btn-del { background: rgba(233,69,96,0.2); color: #e94560; }
.btn-del:hover { background: rgba(233,69,96,0.4); }

.skill-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: #0d1b2e; border: 1px solid rgba(255,255,255,0.05); border-radius: 4px; margin-bottom: 6px; }
.skill-info { flex: 1; }
.skill-name { font-size: 13px; color: #e0e0e0; }
.skill-desc { font-size: 11px; color: #666; margin-top: 2px; }
.toggle { position: relative; display: inline-block; width: 40px; height: 22px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: #333; border-radius: 22px; cursor: pointer; transition: .3s; }
.toggle-slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .3s; }
input:checked + .toggle-slider { background: #28a745; }
input:checked + .toggle-slider:before { transform: translateX(18px); }

.prompt-item { background: #0d1b2e; border: 1px solid rgba(255,255,255,0.05); border-radius: 6px; padding: 12px 14px; margin-bottom: 8px; }
.prompt-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.prompt-item-name { font-size: 13px; font-weight: 600; color: #5ba8f5; }
.prompt-item-desc { font-size: 11px; color: #666; }
.prompt-item-content { font-size: 12px; color: #aaa; white-space: pre-wrap; max-height: 60px; overflow: hidden; text-overflow: ellipsis; }

/* 모달 */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 20px; max-width: 700px; width: 90%; max-height: 80vh; overflow-y: auto; }
.modal h3 { font-size: 15px; color: #ccc; margin-bottom: 14px; }
.modal-close { float: right; cursor: pointer; font-size: 18px; color: #888; background: none; border: none; }

/* 스크롤바 */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #555; }

.loading { display: inline-block; width: 14px; height: 14px; border: 2px solid #555; border-top-color: #e94560; border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state { text-align: center; color: #555; padding: 40px; font-size: 14px; }
</style>
</head>
<body>

<!-- 탭 헤더 -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('chat')">채팅</button>
  <button class="tab-btn" onclick="switchTab('history')">대화이력</button>
  <button class="tab-btn" onclick="switchTab('functions')">함수</button>
  <button class="tab-btn" onclick="switchTab('settings')">설정</button>
</div>

<!-- ═══ 채팅 탭 ═══ -->
<div id="tab-chat" class="tab-content active">
  <div class="chat-sidebar">
    <div class="chat-sidebar-header">
      <span>대화 목록</span>
      <button class="btn-new" onclick="newConversation()">+ 새대화</button>
    </div>
    <div class="convo-list" id="convo-list"></div>
  </div>
  <div class="chat-main">
    <div class="chat-messages" id="chat-messages">
      <div class="empty-state">새 대화를 시작하거나 기존 대화를 선택하세요.</div>
    </div>
    <div class="chat-input-row">
      <textarea class="chat-input" id="chat-input" placeholder="메시지를 입력하세요... (Shift+Enter 줄바꿈)" rows="1"
        onkeydown="handleInputKey(event)"></textarea>
      <button class="btn-send" id="btn-send" onclick="sendMessage()">전송</button>
    </div>
  </div>
</div>

<!-- ═══ 대화이력 탭 ═══ -->
<div id="tab-history" class="tab-content">
  <div class="history-panel">
    <div class="filter-row">
      <input id="hist-keyword" placeholder="키워드 검색..." style="width:180px">
      <select id="hist-status">
        <option value="">전체 상태</option>
        <option value="active">active</option>
        <option value="final">final</option>
      </select>
      <button class="btn-search" onclick="loadHistory()">검색</button>
    </div>
    <table id="hist-table">
      <thead>
        <tr><th>제목</th><th>상태</th><th>최근 업데이트</th><th>키워드</th><th></th></tr>
      </thead>
      <tbody id="hist-tbody"></tbody>
    </table>
  </div>
</div>

<!-- ═══ 함수 탭 ═══ -->
<div id="tab-functions" class="tab-content">
  <div class="functions-panel">
    <div class="stats-bar" id="func-stats"></div>
    <div class="filter-row">
      <input id="func-group-filter" placeholder="모듈 그룹 필터..." style="width:200px">
      <label style="font-size:13px;color:#888;display:flex;align-items:center;gap:6px;">
        <input type="checkbox" id="func-show-all" onchange="loadFunctions()"> 비활성 포함
      </label>
      <button class="btn-search" onclick="loadFunctions()">검색</button>
    </div>
    <div id="func-list"></div>
  </div>
</div>

<!-- ═══ 설정 탭 ═══ -->
<div id="tab-settings" class="tab-content">
  <div class="settings-panel">
    <div class="sub-tab-bar">
      <button class="sub-tab-btn active" onclick="switchSubTab('prompts')">시스템프롬프트</button>
      <button class="sub-tab-btn" onclick="switchSubTab('personas')">페르소나</button>
      <button class="sub-tab-btn" onclick="switchSubTab('skills')">스킬</button>
      <button class="sub-tab-btn" onclick="switchSubTab('macros')">매크로</button>
      <button class="sub-tab-btn" onclick="switchSubTab('workflows')">워크플로우</button>
    </div>

    <!-- 시스템프롬프트 -->
    <div id="sub-prompts" class="sub-tab-content active">
      <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;">
        <div style="flex:1;min-width:280px;">
          <h3 style="font-size:14px;color:#ccc;margin-bottom:12px;" id="prompt-form-title">새 프롬프트 추가</h3>
          <div class="form-group"><label>이름</label><input id="pf-name" placeholder="prompt_name"></div>
          <div class="form-group"><label>설명</label><input id="pf-desc" placeholder="설명 (선택)"></div>
          <div class="form-group"><label>내용</label><textarea id="pf-content" placeholder="시스템 프롬프트 내용..." style="min-height:120px;"></textarea></div>
          <div class="form-group" style="display:flex;align-items:center;gap:8px;">
            <input type="checkbox" id="pf-default"> <label for="pf-default" style="margin:0;font-size:13px;color:#888;">기본값으로 설정</label>
          </div>
          <div style="display:flex;gap:8px;">
            <button class="btn-primary" onclick="savePrompt()">저장</button>
            <button class="btn-primary" style="background:#333;" onclick="clearPromptForm()">취소</button>
          </div>
        </div>
        <div style="flex:2;min-width:300px;">
          <h3 style="font-size:14px;color:#ccc;margin-bottom:12px;">프롬프트 목록</h3>
          <div id="prompt-list"></div>
        </div>
      </div>
    </div>

    <!-- 페르소나 -->
    <div id="sub-personas" class="sub-tab-content">
      <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;">
        <div style="flex:1;min-width:280px;">
          <h3 style="font-size:14px;color:#ccc;margin-bottom:12px;" id="persona-form-title">새 페르소나 추가</h3>
          <div class="form-group"><label>이름</label><input id="persona-name" placeholder="persona_name"></div>
          <div class="form-group"><label>표시 이름</label><input id="persona-display" placeholder="표시 이름"></div>
          <div class="form-group"><label>설명</label><input id="persona-desc" placeholder="설명 (선택)"></div>
          <div class="form-group"><label>시스템 프롬프트</label><textarea id="persona-prompt" placeholder="시스템 프롬프트..." style="min-height:100px;"></textarea></div>
          <div class="form-group"><label>허용 스킬 (쉼표 구분)</label><input id="persona-skills" placeholder="skill1,skill2"></div>
          <div class="form-group"><label>키워드 (쉼표 구분)</label><input id="persona-kws" placeholder="keyword1,keyword2"></div>
          <div class="form-group" style="display:flex;align-items:center;gap:8px;">
            <input type="checkbox" id="persona-default"> <label for="persona-default" style="margin:0;font-size:13px;color:#888;">기본값</label>
          </div>
          <div style="display:flex;gap:8px;">
            <button class="btn-primary" onclick="savePersona()">저장</button>
            <button class="btn-primary" style="background:#333;" onclick="clearPersonaForm()">취소</button>
          </div>
        </div>
        <div style="flex:2;min-width:300px;">
          <h3 style="font-size:14px;color:#ccc;margin-bottom:12px;">페르소나 목록</h3>
          <div id="persona-list"></div>
        </div>
      </div>
    </div>

    <!-- 스킬 -->
    <div id="sub-skills" class="sub-tab-content">
      <h3 style="font-size:14px;color:#ccc;margin-bottom:12px;">스킬 목록</h3>
      <div id="skill-list"></div>
    </div>

    <!-- 매크로 -->
    <div id="sub-macros" class="sub-tab-content">
      <h3 style="font-size:14px;color:#ccc;margin-bottom:12px;">매크로 목록</h3>
      <div id="macro-list"></div>
    </div>

    <!-- 워크플로우 -->
    <div id="sub-workflows" class="sub-tab-content">
      <h3 style="font-size:14px;color:#ccc;margin-bottom:12px;">워크플로우 목록</h3>
      <div id="workflow-list"></div>
    </div>
  </div>
</div>

<!-- 히스토리 모달 -->
<div class="modal-overlay" id="hist-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('hist-modal')">✕</button>
    <h3 id="hist-modal-title">대화 이력</h3>
    <div id="hist-modal-body" style="font-size:12px;color:#aaa;white-space:pre-wrap;max-height:60vh;overflow-y:auto;"></div>
  </div>
</div>

<script>
// ═══ 전역 상태 ═══
let currentConvoId = null;
let currentHistory = [];
let isBusy = false;
let editingPromptName = null;
let editingPersonaName = null;

// ═══ 유틸 ═══
const API = (path, opts={}) => fetch('/api/v1' + path, {
  headers: {'Content-Type': 'application/json'},
  ...opts
}).then(r => r.json());

const AGENT = (path, body) => fetch(path, {
  method: 'POST',
  headers: {'Content-Type': 'application/json'},
  body: JSON.stringify(body)
}).then(r => r.json());

function uuid4() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setBusy(v) {
  isBusy = v;
  document.getElementById('btn-send').disabled = v;
  document.getElementById('chat-input').disabled = v;
}

// ═══ 탭 전환 ═══
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    const tabs = ['chat','history','functions','settings'];
    b.classList.toggle('active', tabs[i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');

  if (name === 'history') loadHistory();
  if (name === 'functions') { loadFunctions(); loadFuncStats(); }
  if (name === 'settings') loadSettingsTab('prompts');
}

function switchSubTab(name) {
  document.querySelectorAll('.sub-tab-btn').forEach((b,i) => {
    const tabs = ['prompts','personas','skills','macros','workflows'];
    b.classList.toggle('active', tabs[i] === name);
  });
  document.querySelectorAll('.sub-tab-content').forEach(el => el.classList.remove('active'));
  document.getElementById('sub-' + name).classList.add('active');
  loadSettingsTab(name);
}

// ═══ 채팅 ═══
async function loadConvoList() {
  const list = await API('/conversations');
  const el = document.getElementById('convo-list');
  if (!list.length) { el.innerHTML = '<div class="empty-state" style="padding:20px;font-size:12px;">대화 없음</div>'; return; }
  el.innerHTML = list.map(c =>
    `<div class="convo-item${c.id===currentConvoId?' active':''}" onclick="openConversation('${c.id}')" title="${escapeHtml(c.title)}">
      ${escapeHtml(c.title||'Untitled')}
    </div>`
  ).join('');
}

function newConversation() {
  currentConvoId = uuid4();
  currentHistory = [];
  document.getElementById('chat-messages').innerHTML = '<div class="msg system">새 대화가 시작되었습니다.</div>';
  loadConvoList();
}

async function openConversation(id) {
  currentConvoId = id;
  currentHistory = [];
  const data = await API('/conversations/' + id);
  if (data.detail) { alert(data.detail); return; }
  currentHistory = data.history || [];
  const el = document.getElementById('chat-messages');
  el.innerHTML = '';
  // 히스토리 렌더
  for (const entry of currentHistory) {
    if (typeof entry !== 'string') continue;
    if (entry.startsWith('사용자 요청:')) {
      appendMsg('user', entry.replace('사용자 요청:','').trim());
    } else if (entry.startsWith('최종 답변:')) {
      appendMsg('assistant', entry.replace('최종 답변:','').trim());
    } else {
      appendMsg('system', entry);
    }
  }
  loadConvoList();
}

function appendMsg(type, text) {
  const el = document.getElementById('chat-messages');
  const d = document.createElement('div');
  d.className = 'msg ' + type;
  d.textContent = text;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
  return d;
}

function appendPlanCard(group, onConfirm) {
  const el = document.getElementById('chat-messages');
  const d = document.createElement('div');
  d.className = 'plan-card';
  d.innerHTML = `
    <h4>실행 계획: [${escapeHtml(group.group_id||'')}]</h4>
    <p>${escapeHtml(group.description||'')}</p>
    <div class="plan-actions">
      <button class="btn-confirm" id="btn-plan-confirm">확인</button>
      <button class="btn-cancel" id="btn-plan-cancel">취소</button>
    </div>`;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
  d.querySelector('#btn-plan-confirm').onclick = () => { d.querySelector('.plan-actions').remove(); onConfirm(); };
  d.querySelector('#btn-plan-cancel').onclick = () => { d.remove(); setBusy(false); };
  return d;
}

function handleInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

async function sendMessage() {
  if (isBusy) return;
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  if (!currentConvoId) { currentConvoId = uuid4(); }
  appendMsg('user', text);
  setBusy(true);

  const spinner = appendMsg('system', '처리 중...');

  try {
    const res = await AGENT('/agent/decide_and_act', {
      conversation_id: currentConvoId,
      history: currentHistory,
      user_input: text
    });
    spinner.remove();
    currentHistory = res.history || currentHistory;
    await handleAgentResponse(res);
  } catch(e) {
    spinner.remove();
    appendMsg('error', '요청 실패: ' + e.message);
    setBusy(false);
  }
  loadConvoList();
}

async function handleAgentResponse(res) {
  if (res.status === 'PLAN_CONFIRMATION') {
    appendPlanCard(res.execution_group, executeGroup);
    setBusy(false); // 사용자가 확인 버튼 누를 때까지 대기
    // 확인 버튼이 setBusy(true) 후 executeGroup 호출
  } else if (res.status === 'STEP_EXECUTED') {
    appendMsg('system', res.message || '단계 실행 완료');
    await planNext();
  } else if (res.status === 'FINAL_ANSWER') {
    appendMsg('assistant', res.message || '');
    setBusy(false);
    loadConvoList();
  } else if (res.status === 'ERROR') {
    appendMsg('error', res.message || '오류 발생');
    setBusy(false);
  } else {
    appendMsg('system', JSON.stringify(res));
    setBusy(false);
  }
}

async function executeGroup() {
  setBusy(true);
  const spinner = appendMsg('system', '실행 중...');
  try {
    const res = await AGENT('/agent/execute_group', {
      conversation_id: currentConvoId,
      history: currentHistory
    });
    spinner.remove();
    currentHistory = res.history || currentHistory;
    await handleAgentResponse(res);
  } catch(e) {
    spinner.remove();
    appendMsg('error', '실행 실패: ' + e.message);
    setBusy(false);
  }
}

async function planNext() {
  setBusy(true);
  const spinner = appendMsg('system', '다음 단계 계획 중...');
  try {
    const res = await AGENT('/agent/decide_and_act', {
      conversation_id: currentConvoId,
      history: currentHistory
    });
    spinner.remove();
    currentHistory = res.history || currentHistory;
    await handleAgentResponse(res);
  } catch(e) {
    spinner.remove();
    appendMsg('error', '재계획 실패: ' + e.message);
    setBusy(false);
  }
}

// ═══ 대화이력 ═══
async function loadHistory() {
  const kw = document.getElementById('hist-keyword').value.trim();
  const st = document.getElementById('hist-status').value;
  let url = '/conversations?';
  if (kw) url += `keyword=${encodeURIComponent(kw)}&`;
  if (st) url += `status=${st}&`;
  const list = await API(url);
  const tbody = document.getElementById('hist-tbody');
  if (!list.length) { tbody.innerHTML = '<tr><td colspan="5" class="empty-state">대화 없음</td></tr>'; return; }
  tbody.innerHTML = list.map(c => `
    <tr>
      <td>${escapeHtml(c.title||'Untitled')}</td>
      <td><span class="badge ${c.status}">${c.status}</span></td>
      <td>${(c.last_updated||'').slice(0,16)}</td>
      <td>${(c.keywords||[]).map(k=>`<span class="kw-tag">${escapeHtml(k)}</span>`).join('')}</td>
      <td>
        <button class="btn-icon" title="이력 보기" onclick="showHistModal('${c.id}','${escapeHtml(c.title||'')}')">👁</button>
        <button class="btn-icon btn-danger" title="삭제" onclick="deleteConvo('${c.id}')">🗑</button>
      </td>
    </tr>`).join('');
}

async function showHistModal(id, title) {
  const data = await API('/conversations/' + id);
  document.getElementById('hist-modal-title').textContent = title || id;
  document.getElementById('hist-modal-body').textContent = (data.history||[]).join('\n');
  document.getElementById('hist-modal').classList.add('open');
}

async function deleteConvo(id) {
  if (!confirm('대화를 삭제하시겠습니까?')) return;
  await API('/conversations/' + id, {method:'DELETE'});
  loadHistory();
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ═══ 함수 ═══
async function loadFuncStats() {
  const stats = await API('/functions/stats');
  const el = document.getElementById('func-stats');
  const rate = stats.success_rate != null ? (stats.success_rate * 100).toFixed(1) + '%' : 'N/A';
  const avg = stats.avg_duration_ms != null ? stats.avg_duration_ms.toFixed(1) + 'ms' : 'N/A';
  el.innerHTML = `
    <div class="stat-card"><div class="stat-label">전체 호출</div><div class="stat-value">${stats.total_calls||0}</div></div>
    <div class="stat-card"><div class="stat-label">성공률</div><div class="stat-value">${rate}</div></div>
    <div class="stat-card"><div class="stat-label">평균 소요</div><div class="stat-value">${avg}</div></div>
  `;
}

async function loadFunctions() {
  const grp = document.getElementById('func-group-filter').value.trim();
  const showAll = document.getElementById('func-show-all').checked;
  let url = `/functions?active_only=${!showAll}`;
  if (grp) url += `&module_group=${encodeURIComponent(grp)}`;
  const list = await API(url);
  const el = document.getElementById('func-list');
  if (!list.length) { el.innerHTML = '<div class="empty-state">함수 없음</div>'; return; }

  // 모듈 그룹별 그루핑
  const groups = {};
  for (const f of list) {
    if (!groups[f.module_group]) groups[f.module_group] = [];
    groups[f.module_group].push(f);
  }
  el.innerHTML = Object.entries(groups).map(([grp, fns]) => `
    <div class="func-group-header" onclick="toggleGroup(this)">
      ${escapeHtml(grp)} <span>${fns.length}개 ▾</span>
    </div>
    <div class="func-group-body">
      ${fns.map(f => `
        <div class="func-row" onclick="showFuncCode(this,'${escapeHtml(f.func_name)}')">
          <div class="func-name">${escapeHtml(f.func_name)} <small style="color:#555">v${f.version}</small></div>
          <div class="func-desc">${escapeHtml(f.description||'설명 없음')}</div>
        </div>
        <pre class="code-view" style="display:none">${escapeHtml(f.code||'')}</pre>
      `).join('')}
    </div>`).join('');
}

function toggleGroup(el) {
  const body = el.nextElementSibling;
  body.style.display = body.style.display === 'none' ? '' : 'none';
}

function showFuncCode(rowEl, name) {
  const pre = rowEl.nextElementSibling;
  pre.style.display = pre.style.display === 'none' ? 'block' : 'none';
}

// ═══ 설정 ═══
async function loadSettingsTab(name) {
  if (name === 'prompts') await loadPrompts();
  else if (name === 'personas') await loadPersonas();
  else if (name === 'skills') await loadSkills();
  else if (name === 'macros') await loadMacros();
  else if (name === 'workflows') await loadWorkflows();
}

// 시스템프롬프트
async function loadPrompts() {
  const list = await API('/settings/prompts');
  const el = document.getElementById('prompt-list');
  if (!list.length) { el.innerHTML = '<div class="empty-state">프롬프트 없음</div>'; return; }
  el.innerHTML = list.map(p => `
    <div class="prompt-item">
      <div class="prompt-item-header">
        <div>
          <span class="prompt-item-name">${escapeHtml(p.name)}</span>
          ${p.is_default ? '<span class="badge final" style="margin-left:6px;">기본값</span>' : ''}
        </div>
        <div style="display:flex;gap:4px;">
          <button class="btn-sm btn-edit" onclick="editPrompt(${JSON.stringify(p).replace(/"/g,'&quot;')})">편집</button>
          <button class="btn-sm btn-del" onclick="deletePrompt('${escapeHtml(p.name)}')">삭제</button>
        </div>
      </div>
      <div class="prompt-item-desc">${escapeHtml(p.description||'')}</div>
      <div class="prompt-item-content">${escapeHtml(p.content||'')}</div>
    </div>`).join('');
}

function editPrompt(p) {
  editingPromptName = p.name;
  document.getElementById('pf-name').value = p.name;
  document.getElementById('pf-name').disabled = true;
  document.getElementById('pf-desc').value = p.description||'';
  document.getElementById('pf-content').value = p.content||'';
  document.getElementById('pf-default').checked = !!p.is_default;
  document.getElementById('prompt-form-title').textContent = '프롬프트 편집: ' + p.name;
}

function clearPromptForm() {
  editingPromptName = null;
  document.getElementById('pf-name').value = '';
  document.getElementById('pf-name').disabled = false;
  document.getElementById('pf-desc').value = '';
  document.getElementById('pf-content').value = '';
  document.getElementById('pf-default').checked = false;
  document.getElementById('prompt-form-title').textContent = '새 프롬프트 추가';
}

async function savePrompt() {
  const name = document.getElementById('pf-name').value.trim();
  const content = document.getElementById('pf-content').value.trim();
  if (!name || !content) { alert('이름과 내용은 필수입니다.'); return; }
  const body = {
    name, content,
    description: document.getElementById('pf-desc').value,
    is_default: document.getElementById('pf-default').checked
  };
  if (editingPromptName) {
    await API('/settings/prompts/' + encodeURIComponent(editingPromptName), {method:'PUT', body: JSON.stringify(body)});
  } else {
    await API('/settings/prompts', {method:'POST', body: JSON.stringify(body)});
  }
  clearPromptForm();
  await loadPrompts();
}

async function deletePrompt(name) {
  if (!confirm(`프롬프트 "${name}"을 삭제하시겠습니까?`)) return;
  await API('/settings/prompts/' + encodeURIComponent(name), {method:'DELETE'});
  await loadPrompts();
}

// 페르소나
async function loadPersonas() {
  const list = await API('/settings/personas');
  const el = document.getElementById('persona-list');
  if (!list.length) { el.innerHTML = '<div class="empty-state">페르소나 없음</div>'; return; }
  el.innerHTML = list.map(p => `
    <div class="prompt-item">
      <div class="prompt-item-header">
        <div>
          <span class="prompt-item-name">${escapeHtml(p.display_name||p.name)}</span>
          <span style="color:#555;font-size:11px;margin-left:6px;">${escapeHtml(p.name)}</span>
          ${p.is_default ? '<span class="badge final" style="margin-left:6px;">기본값</span>' : ''}
        </div>
        <div style="display:flex;gap:4px;">
          <button class="btn-sm btn-edit" onclick="editPersona(${JSON.stringify(p).replace(/"/g,'&quot;')})">편집</button>
          <button class="btn-sm btn-del" onclick="deletePersona('${escapeHtml(p.name)}')">삭제</button>
        </div>
      </div>
      <div class="prompt-item-desc">${escapeHtml(p.description||'')}</div>
      <div style="font-size:11px;color:#555;margin-top:4px;">
        키워드: ${(p.keywords||[]).map(k=>`<span class="kw-tag">${escapeHtml(k)}</span>`).join('') || '없음'}
      </div>
    </div>`).join('');
}

function editPersona(p) {
  editingPersonaName = p.name;
  document.getElementById('persona-name').value = p.name;
  document.getElementById('persona-name').disabled = true;
  document.getElementById('persona-display').value = p.display_name||'';
  document.getElementById('persona-desc').value = p.description||'';
  document.getElementById('persona-prompt').value = p.system_prompt||'';
  document.getElementById('persona-skills').value = (p.allowed_skills||[]).join(',');
  document.getElementById('persona-kws').value = (p.keywords||[]).join(',');
  document.getElementById('persona-default').checked = !!p.is_default;
  document.getElementById('persona-form-title').textContent = '페르소나 편집: ' + p.name;
}

function clearPersonaForm() {
  editingPersonaName = null;
  ['persona-name','persona-display','persona-desc','persona-prompt','persona-skills','persona-kws'].forEach(id => {
    const el = document.getElementById(id);
    el.value = '';
    el.disabled = false;
  });
  document.getElementById('persona-default').checked = false;
  document.getElementById('persona-form-title').textContent = '새 페르소나 추가';
}

async function savePersona() {
  const name = document.getElementById('persona-name').value.trim();
  const prompt = document.getElementById('persona-prompt').value.trim();
  if (!name || !prompt) { alert('이름과 시스템 프롬프트는 필수입니다.'); return; }
  const skillsStr = document.getElementById('persona-skills').value;
  const kwsStr = document.getElementById('persona-kws').value;
  const body = {
    name,
    system_prompt: prompt,
    display_name: document.getElementById('persona-display').value,
    description: document.getElementById('persona-desc').value,
    allowed_skills: skillsStr ? skillsStr.split(',').map(s=>s.trim()).filter(Boolean) : [],
    keywords: kwsStr ? kwsStr.split(',').map(s=>s.trim()).filter(Boolean) : [],
    is_default: document.getElementById('persona-default').checked
  };
  if (editingPersonaName) {
    await API('/settings/personas/' + encodeURIComponent(editingPersonaName), {method:'PUT', body: JSON.stringify(body)});
  } else {
    await API('/settings/personas', {method:'POST', body: JSON.stringify(body)});
  }
  clearPersonaForm();
  await loadPersonas();
}

async function deletePersona(name) {
  if (!confirm(`페르소나 "${name}"을 삭제하시겠습니까?`)) return;
  await API('/settings/personas/' + encodeURIComponent(name), {method:'DELETE'});
  await loadPersonas();
}

// 스킬
async function loadSkills() {
  const list = await API('/settings/skills');
  const el = document.getElementById('skill-list');
  if (!list.length) { el.innerHTML = '<div class="empty-state">스킬 없음</div>'; return; }
  el.innerHTML = list.map(s => `
    <div class="skill-item">
      <div class="skill-info">
        <div class="skill-name">${escapeHtml(s.name)}</div>
        <div class="skill-desc">${escapeHtml(s.description||'')}</div>
      </div>
      <label class="toggle">
        <input type="checkbox" ${s.is_active?'checked':''} onchange="toggleSkill('${escapeHtml(s.name)}', this.checked)">
        <span class="toggle-slider"></span>
      </label>
    </div>`).join('');
}

async function toggleSkill(name, active) {
  await API('/settings/skills/' + encodeURIComponent(name) + '/toggle', {
    method:'POST', body: JSON.stringify({active})
  });
}

// 매크로
async function loadMacros() {
  const list = await API('/settings/macros');
  const el = document.getElementById('macro-list');
  if (!list.length) { el.innerHTML = '<div class="empty-state">매크로 없음</div>'; return; }

    <div class="prompt-item">
      <div class="prompt-item-name">${escapeHtml(m.name)}</div>
      <div class="prompt-item-desc">${escapeHtml(m.description||'')}</div>
      <div style="font-size:11px;color:#555;margin-top:4px;">변수: ${(m.variables||[]).join(', ')||'없음'}</div>
      <pre class="code-view" style="margin-top:8px;">${escapeHtml(m.template||'')}</pre>
    </div>`).join('');
}

// 워크플로우
async function loadWorkflows() {
  const list = await API('/settings/workflows');
  const el = document.getElementById('workflow-list');
  if (!list.length) { el.innerHTML = '<div class="empty-state">워크플로우 없음</div>'; return; }
  el.innerHTML = list.map(w => `
    <div class="prompt-item">
      <div class="prompt-item-name">${escapeHtml(w.name)}</div>
      <div class="prompt-item-desc">${escapeHtml(w.description||'')}</div>
      <div style="font-size:11px;color:#555;margin-top:4px;">단계 수: ${(w.steps||[]).length}</div>

(async function init() {
  await loadConvoList();
})();
</script>
